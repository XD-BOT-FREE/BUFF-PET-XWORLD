<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD PET BUFFER v2.0 - PRO</title>
    <style>
        /* Giao diện Hacker Matrix */
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            text-shadow: 0 0 10px #00ff00;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #008800;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            padding: 20px;
            border-radius: 5px;
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }
        textarea, select, button {
            width: 100%;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #008800;
            padding: 10px;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        button {
            background-color: #003300;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s;
            border: 1px solid #00ff00;
        }
        button:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }
        button:disabled {
            background-color: #111;
            color: #444;
            border-color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }
        #terminal {
            background-color: #000;
            border: 1px dashed #008800;
            margin-top: 20px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .log-success { color: #00ff00; }
        .log-error { color: #ff3333; }
        .log-info { color: #00ccff; }
        .log-warn { color: #ffcc00; }
        
        /* Hiệu ứng nhấp nháy con trỏ */
        .cursor::after {
            content: " █";
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* Scrollbar style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #008800; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>[ SYSTEM.OVERRIDE ]</h1>
        <div class="subtitle">X-WORLD MULTI-PET BUFFER v2.0</div>
        
        <label for="links">Nhập Links (Mỗi link 1 dòng, hỗ trợ buff hàng loạt):</label>
        <textarea id="links" spellcheck="false" placeholder="https://xworld.info/?userId=123&secretKey=abc...&#10;https://xworld.info/?userId=456&secretKey=xyz..."></textarea>

        <label for="level">Chọn Level cần Buff:</label>
        <select id="level">
            </select>

        <button id="btnStart" onclick="startBuffing()">🚀 KHỞI ĐỘNG CHIẾN DỊCH BUFF</button>

        <label>Terminal Output:</label>
        <div id="terminal">
            <div class="log-info">Hệ thống sẵn sàng... Đang chờ lệnh <span class="cursor"></span></div>
        </div>
    </div>

    <script>
        // 1. Khởi tạo danh sách Level (Từ 1 đến 50)
        const levelSelect = document.getElementById('level');
        for (let i = 1; i <= 50; i++) {
            let option = document.createElement('option');
            option.value = i;
            option.text = `Level ${i}`;
            if (i === 37) option.selected = true; // Mặc định level 37
            levelSelect.appendChild(option);
        }

        const terminal = document.getElementById('terminal');
        const btnStart = document.getElementById('btnStart');

        // Hàm in log ra màn hình
        function logMsg(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            
            // Format thời gian HH:MM:SS
            const now = new Date();
            const time = now.toTimeString().split(' ')[0]; 
            
            div.textContent = `[${time}] ${msg}`;
            terminal.appendChild(div);
            // Tự động cuộn xuống dòng mới nhất
            terminal.scrollTop = terminal.scrollHeight;
        }

        // 2. Phân tích URL
        function parseLink(urlStr) {
            try {
                // Xử lý các link dán bị dính khoảng trắng
                const cleanUrl = urlStr.trim().replace(/\s/g, ''); 
                const url = new URL(cleanUrl);
                const params = new URLSearchParams(url.search);
                
                const userId = params.get('userId') || params.get('userid') || params.get('user_id');
                const secretKey = params.get('secretKey') || params.get('secretkey') || params.get('secret_key');

                if (!userId || !secretKey) {
                    return { error: 'Không tìm thấy userId hoặc secretKey' };
                }
                return { userId, secretKey };
            } catch (e) {
                return { error: 'Link không hợp lệ hoặc sai định dạng' };
            }
        }

        // 3. Tạo Payload giả lập Data gửi lên Server
        function generateData(userId, targetLevel) {
            let slots = [];
            for (let i = 0; i < 13; i++) {
                slots.push({ "level": targetLevel, "pos": i });
            }

            let items = [];
            const fakeCoins = [2, 1000, 1393, 939, 339, 8393, 58383, 94932, 13838, 6, 8, 7, 10, 12, 10, 21, 16, 13, 15, 19, 17, 21, 23, 20, 26, 24, 29, 27, 31, 3];
            
            for (let i = 1; i <= targetLevel; i++) {
                let coinCnt = 0;
                if (i <= fakeCoins.length) {
                    coinCnt = fakeCoins[i - 1];
                }
                items.push({ "level": i, "coin_cnt": coinCnt });
            }

            const currentTime = Math.floor(Date.now() / 1000);

            return {
                "user_id": userId,
                "data": {
                    "user_id": userId,
                    "slots": slots,
                    "items": items,
                    "coin": "3773876377738282998892124540909988",
                    "history_coin": "88737383283773763777382829988921245406709988",
                    "max_level": targetLevel,
                    "backup_utc": currentTime
                },
                "ts": currentTime
            };
        }

        // 4. Hàm xử lý Buff chính (Auto-Fallback Proxy)
        async function processBuff(linkText, targetLevel) {
            const parsed = parseLink(linkText);
            if (parsed.error) {
                logMsg(`[!] BỎ QUA: ${parsed.error} -> ${linkText.substring(0, 40)}...`, 'error');
                return;
            }

            const { userId, secretKey } = parsed;
            logMsg(`[*] Chuẩn bị bơm data cho UserID: ${userId} -> Mục tiêu: Level ${targetLevel}`, 'info');

            const payload = generateData(userId, targetLevel);

            const headers = {
                "Accept": "*/*",
                "Content-Type": "application/json",
                "user-secret-key": secretKey,
                "user-id": userId,
                "xb-language": "vi-VN",
                "country-code": "vn",
                "platform": "h5",
                "origin": "https://xworld.info",
                "referer": "https://xworld.info/"
            };

            const TARGET_API = 'https://mpet3.3games.io/api/mpet/store_mpet_data';
            
            // Danh sách các proxy công cộng mượt nhất để dự phòng cho nhau
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(TARGET_API)}`,
                `https://api.codetabs.com/v1/proxy/?quest=${TARGET_API}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(TARGET_API)}`
            ];

            let success = false;

            for (let i = 0; i < proxies.length; i++) {
                const proxyName = new URL(proxies[i]).hostname;
                logMsg(`[~] Đang định tuyến qua cầu: ${proxyName}...`, 'warn');

                try {
                    const response = await fetch(proxies[i], {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify(payload)
                    });

                    const result = await response.text();
                    
                    if ((response.ok && result.includes("success")) || result.includes('"code":0')) {
                        logMsg(`[+] THÀNH CÔNG: UserID ${userId} đã up Level ${targetLevel} hoàn tất!`, 'success');
                        success = true;
                        break; // Buff xong thì thoát vòng lặp proxy
                    } else {
                        logMsg(`[-] Cầu ${proxyName} trả về mã lỗi. Đang chuyển cầu...`, 'error');
                    }
                } catch (error) {
                    logMsg(`[-] Cầu ${proxyName} không phản hồi. Đang nhảy cầu tiếp theo...`, 'error');
                }
            }

            if (!success) {
                logMsg(`[!] THẤT BẠI: Tất cả các cầu đều từ chối UserID ${userId}. Hãy kiểm tra lại link hoặc thử lại sau!`, 'error');
            }
            
            // Phân cách giữa các User cho dễ nhìn
            logMsg(`----------------------------------------`, 'info');
        }

        // 5. Nút khởi chạy vòng lặp
        async function startBuffing() {
            const rawLinks = document.getElementById('links').value;
            const targetLevel = parseInt(document.getElementById('level').value);

            if (!rawLinks.trim()) {
                alert("Bạn chưa nhập link nào!");
                return;
            }

            // Lọc ra các dòng có chứa chữ "http" để bỏ qua các dòng trống hoặc rác
            const linksArray = rawLinks.split('\n').filter(link => link.includes('http'));
            
            if (linksArray.length === 0) {
                alert("Không tìm thấy link hợp lệ nào trong ô nhập liệu!");
                return;
            }

            // Khóa nút ấn để tránh bấm đúp
            btnStart.disabled = true;
            btnStart.textContent = "ĐANG CHẠY TOOL... VUI LÒNG CHỜ";
            terminal.innerHTML = ''; // Xóa log cũ
            
            logMsg(`=== KHỞI ĐỘNG CHIẾN DỊCH ===`, 'success');
            logMsg(`Phát hiện ${linksArray.length} mục tiêu. Bắt đầu rải thảm...`, 'info');
            logMsg(`----------------------------------------`, 'info');

            // Chạy lần lượt để tránh rate limit
            for (let i = 0; i < linksArray.length; i++) {
                logMsg(`>> Tiến trình [${i + 1}/${linksArray.length}]`, 'warn');
                await processBuff(linksArray[i], targetLevel);
                
                // Nghỉ 1.5 giây giữa mỗi acc để server game không phát hiện spam
                if (i < linksArray.length - 1) {
                    await new Promise(r => setTimeout(r, 1500)); 
                }
            }

            logMsg(`=== CHIẾN DỊCH HOÀN TẤT ===`, 'success');
            btnStart.disabled = false;
            btnStart.textContent = "🚀 KHỞI ĐỘNG CHIẾN DỊCH BUFF";
        }
    </script>
</body>
</html>
