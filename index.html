<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD PET BUFF | ROOT TERMINAL</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            padding: 20px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 10px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        textarea, select, button {
            background-color: #000;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 3px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        textarea::placeholder {
            color: #005500;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
        }
        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        .terminal {
            background-color: #000;
            border: 1px solid var(--neon-green);
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            font-size: 11px;
        }
        .log-line { margin: 2px 0; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .success { color: #00ff00; }
        .error { color: #ff3333; }
        .info { color: #00ccff; }
        .warning { color: #ffcc00; }
        
        .cursor::after {
            content: '_';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="cursor">Hệ Thống Buff Pet Auto</h1>
    
    <div class="warning">
        [!] Đã kích hoạt chế độ Multi-Proxy: Tự động chuyển đổi máy chủ vượt rào nếu bị chặn.
    </div>

    <div>
        <label for="links">Nhập danh sách link (Mỗi link 1 dòng):</label>
        <textarea id="links" placeholder="https://escape.../?userId=123&secretKey=abc..."></textarea>
    </div>

    <div>
        <label for="level">Chọn Level Pet muốn buff (1-50):</label>
        <select id="level"></select>
    </div>

    <button id="btn-buff" onclick="startBuff()">[ KHỞI ĐỘNG BUFF ]</button>

    <div>
        <label>Terminal Log:</label>
        <div class="terminal" id="console">
            <div class="log-line info">[*] Khởi tạo Multi-Proxy... OK</div>
            <div class="log-line info">[*] Hệ thống sẵn sàng nhận lệnh...</div>
        </div>
    </div>
</div>

<script>
    const levelSelect = document.getElementById('level');
    for (let i = 1; i <= 50; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.text = `Level ${i}`;
        if (i === 50) option.selected = true; // Set mặc định level 50 theo ảnh của bạn
        levelSelect.appendChild(option);
    }

    function log(message, type = 'info') {
        const terminal = document.getElementById('console');
        const div = document.createElement('div');
        div.className = `log-line ${type}`;
        const time = new Date().toLocaleTimeString();
        div.textContent = `[${time}] ${message}`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight; 
    }

    function parseLink(urlStr) {
        try {
            const url = new URL(urlStr.trim());
            const params = new URLSearchParams(url.search);
            const userId = params.get("userId") || params.get("userid") || params.get("user_id");
            const secretKey = params.get("secretKey") || params.get("secretkey") || params.get("secret_key");
            
            if (!userId || !secretKey) throw new Error("Thiếu userId hoặc secretKey");
            return { userId, secretKey };
        } catch (e) {
            return { error: e.message };
        }
    }

    function generatePayload(userId, targetLevel) {
        const slots = [];
        for (let i = 0; i < 13; i++) { slots.push({ level: targetLevel, pos: i }); }
        const items = [];
        for (let i = 1; i <= targetLevel; i++) {
            const coinCnt = (i === targetLevel) ? 0 : Math.floor(Math.random() * 50) + 1;
            items.push({ level: i, coin_cnt: coinCnt });
        }
        const ts = Date.now() / 1000;
        return {
            user_id: userId,
            data: {
                user_id: userId,
                slots: slots,
                items: items,
                coin: "3773876377738282998892124540909988",
                history_coin: "88737383283773763777382829988921245406709988",
                max_level: targetLevel,
                backup_utc: ts
            },
            ts: ts
        };
    }

    // Cơ chế bọc nhiều Proxy
    async function sendRequestWithProxies(userId, secretKey, payload) {
        const targetUrl = 'https://mpet3.3games.io/api/mpet/store_mpet_data';
        
        // Danh sách các máy chủ trung gian để thử nghiệm
        const proxies = [
            { name: "Proxy 1 (ThingProxy)", url: 'https://thingproxy.freeboard.io/fetch/' + targetUrl },
            { name: "Proxy 2 (CORS.org)", url: 'https://corsproxy.org/?' + encodeURIComponent(targetUrl) },
            { name: "Proxy 3 (CORS.io)", url: 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) }
        ];

        const headers = {
            "Content-Type": "application/json",
            "sec-ch-ua-platform": "\"Android\"",
            "user-secret-key": secretKey,
            "xb-language": "vi-VN",
            "country-code": "vn",
            "user-id": userId,
            "platform": "h5",
            "origin": "https://xworld.info",
            "referer": "https://xworld.info/"
        };

        for (let proxy of proxies) {
            log(`[INFO] Đang gửi qua ${proxy.name}...`, 'info');
            try {
                const response = await fetch(proxy.url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });

                const result = await response.text();
                
                if (response.ok) {
                    log(`[Thành công] ID ${userId}: ${result}`, 'success');
                    return true; // Thành công thì thoát vòng lặp proxy ngay
                } else {
                    log(`[Lỗi Game Server] ${proxy.name} trả về HTTP ${response.status}`, 'warning');
                    // Nếu lỗi 400, 403 từ server game (chứ ko phải lỗi proxy sập) thì ko thử nữa
                    if(response.status < 500) return false; 
                }
            } catch (err) {
                log(`[Thất bại] ${proxy.name} từ chối kết nối. Tự động chuyển...`, 'error');
                // Lỗi mạng/CORS thì vòng lặp sẽ tự động nhảy sang proxy tiếp theo
            }
        }
        
        log(`[X] Đã thử hết toàn bộ Proxy cho ID ${userId} nhưng đều bị chặn.`, 'error');
        return false;
    }

    async function startBuff() {
        const linksText = document.getElementById('links').value;
        const targetLevel = parseInt(document.getElementById('level').value);
        const btn = document.getElementById('btn-buff');
        const lines = linksText.split('\n').filter(line => line.trim() !== '');
        
        if (lines.length === 0) return log('Lỗi: Vui lòng nhập link!', 'error');

        btn.disabled = true;
        btn.textContent = "[ ĐANG XỬ LÝ... ]";
        log(`== BẮT ĐẦU BUFF LEVEL ${targetLevel} CHO ${lines.length} TÀI KHOẢN ==`, 'warning');

        for (let i = 0; i < lines.length; i++) {
            const link = lines[i];
            log(`[-] Đang bẻ khóa link ${i + 1}/${lines.length}...`, 'info');
            
            const parsed = parseLink(link);
            if (parsed.error) {
                log(`[Lỗi Link] Dòng ${i + 1}: ${parsed.error}`, 'error');
                continue;
            }

            const payload = generatePayload(parsed.userId, targetLevel);
            
            // Gọi hàm gửi qua nhiều Proxy
            await sendRequestWithProxies(parsed.userId, parsed.secretKey, payload);
            
            await new Promise(r => setTimeout(r, 1500)); // Nghỉ 1.5s
        }

        log('==== HOÀN TẤT TOÀN BỘ TIẾN TRÌNH ====', 'success');
        btn.disabled = false;
        btn.textContent = "[ KHỞI ĐỘNG BUFF ]";
    }
</script>

</body>
</html>
