<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD PET BUFF | ROOT TERMINAL</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            padding: 20px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 10px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        textarea, select, button {
            background-color: #000;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 3px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        textarea::placeholder {
            color: #005500;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
        }
        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        .terminal {
            background-color: #000;
            border: 1px solid var(--neon-green);
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-line { margin: 2px 0; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .success { color: #00ff00; }
        .error { color: #ff3333; }
        .info { color: #00ccff; }
        .warning { color: #ffcc00; font-size: 11px; }
        
        /* Hiệu ứng nhấp nháy con trỏ */
        .cursor::after {
            content: '_';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="cursor">Hệ Thống Buff Pet Auto</h1>
    
    <div class="warning">
        [!] Lưu ý: Hệ thống đang sử dụng Public Proxy để vượt rào bảo mật. Tốc độ có thể phụ thuộc vào máy chủ trung gian.
    </div>

    <div>
        <label for="links">Nhập danh sách link (Mỗi link 1 dòng):</label>
        <textarea id="links" placeholder="https://xworld.info/?userId=123&secretKey=abc...&#10;https://xworld.info/?userId=456&secretKey=xyz..."></textarea>
    </div>

    <div>
        <label for="level">Chọn Level Pet muốn buff (1-50):</label>
        <select id="level"></select>
    </div>

    <button id="btn-buff" onclick="startBuff()">[ KHỞI ĐỘNG BUFF ]</button>

    <div>
        <label>Terminal Log:</label>
        <div class="terminal" id="console">
            <div class="log-line info">[*] Bypassing Browser Security... OK</div>
            <div class="log-line info">[*] Hệ thống sẵn sàng nhận lệnh...</div>
        </div>
    </div>
</div>

<script>
    // Khởi tạo danh sách level
    const levelSelect = document.getElementById('level');
    for (let i = 1; i <= 50; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.text = `Level ${i}`;
        if (i === 37) option.selected = true; // Mặc định level 37
        levelSelect.appendChild(option);
    }

    // Hàm in log ra màn hình terminal
    function log(message, type = 'info') {
        const terminal = document.getElementById('console');
        const div = document.createElement('div');
        div.className = `log-line ${type}`;
        const time = new Date().toLocaleTimeString();
        div.textContent = `[${time}] ${message}`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight; // Tự động cuộn xuống cuối
    }

    // Hàm bóc tách userId và secretKey từ URL
    function parseLink(urlStr) {
        try {
            const url = new URL(urlStr.trim());
            const params = new URLSearchParams(url.search);
            
            const userId = params.get("userId") || params.get("userid") || params.get("user_id");
            const secretKey = params.get("secretKey") || params.get("secretkey") || params.get("secret_key");
            
            if (!userId || !secretKey) throw new Error("Thiếu userId hoặc secretKey");
            if (!/^\d+$/.test(userId)) throw new Error(`userId không hợp lệ: ${userId}`);
            if (secretKey.length < 10) throw new Error("secretKey quá ngắn");
            
            return { userId, secretKey };
        } catch (e) {
            return { error: e.message };
        }
    }

    // Hàm tự động tạo payload động dựa trên level yêu cầu
    function generatePayload(userId, targetLevel) {
        const slots = [];
        for (let i = 0; i < 13; i++) {
            slots.push({ level: targetLevel, pos: i });
        }

        const items = [];
        for (let i = 1; i <= targetLevel; i++) {
            const coinCnt = (i === targetLevel) ? 0 : Math.floor(Math.random() * 50) + 1;
            items.push({ level: i, coin_cnt: coinCnt });
        }

        const ts = Date.now() / 1000;

        return {
            user_id: userId,
            data: {
                user_id: userId,
                slots: slots,
                items: items,
                coin: "3773876377738282998892124540909988",
                history_coin: "88737383283773763777382829988921245406709988",
                max_level: targetLevel,
                backup_utc: ts
            },
            ts: ts
        };
    }

    // Vòng lặp chính xử lý từng tài khoản
    async function startBuff() {
        const linksText = document.getElementById('links').value;
        const targetLevel = parseInt(document.getElementById('level').value);
        const btn = document.getElementById('btn-buff');
        
        const lines = linksText.split('\n').filter(line => line.trim() !== '');
        
        if (lines.length === 0) {
            log('Lỗi: Vui lòng nhập ít nhất 1 link!', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = "[ ĐANG XỬ LÝ... ]";
        log(`Bắt đầu chạy tiến trình cho ${lines.length} tài khoản lên Level ${targetLevel}...`, 'warning');

        // URL của game
        const targetUrl = 'https://mpet3.3games.io/api/mpet/store_mpet_data';
        // Sử dụng CORS Proxy để lừa trình duyệt
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        for (let i = 0; i < lines.length; i++) {
            const link = lines[i];
            log(`[-] Đang bẻ khóa & xử lý link ${i + 1}/${lines.length}...`, 'info');
            
            const parsed = parseLink(link);
            if (parsed.error) {
                log(`[Thất bại] Dòng ${i + 1}: ${parsed.error}`, 'error');
                continue;
            }

            const { userId, secretKey } = parsed;
            const payload = generatePayload(userId, targetLevel);

            // Bê nguyên bộ Header đánh lừa máy chủ game từ Python sang
            const headers = {
                "Content-Type": "application/json",
                "sec-ch-ua-platform": "\"Android\"",
                "user-secret-key": secretKey,
                "xb-language": "vi-VN",
                "country-code": "vn",
                "user-id": userId,
                "platform": "h5",
                "origin": "https://xworld.info",
                "referer": "https://xworld.info/"
            };

            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });

                const result = await response.text();
                
                if (response.ok) {
                    log(`[Thành công] ID ${userId} - Phản hồi: ${result}`, 'success');
                } else {
                    log(`[Lỗi Server Game] ID ${userId}: HTTP ${response.status} - ${result}`, 'error');
                }
            } catch (err) {
                log(`[Lỗi Proxy/Mạng] ID ${userId}: ${err.message}. Proxy có thể đang quá tải.`, 'error');
            }
            
            // Nghỉ 2 giây giữa các account để tránh Proxy hoặc Game chặn spam
            await new Promise(r => setTimeout(r, 2000));
        }

        log('==== HOÀN TẤT TOÀN BỘ TIẾN TRÌNH ====', 'info');
        btn.disabled = false;
        btn.textContent = "[ KHỞI ĐỘNG BUFF ]";
    }
</script>

</body>
</html>
