<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Buff Pet</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input[type="text"] { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #result { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 4px; word-wrap: break-word; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nhập Link Game</h2>
        <input type="text" id="gameLink" placeholder="Dán link game vào đây...">
        <button onclick="sendRequest()">Thực hiện Buff</button>
        <div id="result">Kết quả sẽ hiển thị ở đây...</div>
    </div>

    <script>
        async function sendRequest() {
            const link = document.getElementById('gameLink').value;
            const resultDiv = document.getElementById('result');
            
            // LƯU Ý: Thay URL này bằng địa chỉ server thật của bạn sau khi deploy server.py
            const backendUrl = "https://buffpet45.onrender.com/api/buff";

            if (!link) {
                resultDiv.innerText = "❌ Vui lòng nhập link!";
                return;
            }

            resultDiv.innerText = "⏳ Đang xử lý... Vui lòng đợi.";

            try {
                const response = await fetch(backendUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ link: link })
                });

                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerText = "✅ Thành công!\nUser ID: " + data.user_id + "\nPhản hồi từ game: " + data.game_response;
                } else {
                    resultDiv.innerText = "❌ Lỗi: " + (data.error || "Không xác định");
                }
            } catch (error) {
                resultDiv.innerText = "❌ Lỗi kết nối đến server: " + error.message + "\n(Vui lòng kiểm tra lại backendUrl trong code html)";
            }
        }
    </script>
</body>
</html>
